server {
    listen 80;
    server_name helix.dostcaraga.ph;

    server_tokens off;

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* \.map$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* (composer\.(json|lock)|package\.json|package-lock\.json|yarn\.lock|vite\.config|tsconfig|\.env|README|LICENSE|Makefile) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location /assets/ {
        alias /home/talinoserver2/Documents/bot-builder-suite/dist/client/assets/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /_public/ {
        alias /home/talinoserver2/Documents/bot-builder-suite/dist/client/;
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "no-store, max-age=0" always;
        add_header Pragma "no-cache" always;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }
}

